                                                { label: '(...)', title: 'Bọc đoạn đã bôi đen', onClick: () => { wrapSelectionWith('(', ')'); closeSymbolMenu(); } },
                                            ])}
                                            onPointerUp={() => { cancelSymbolHold(); if (!symbolHoldOpenedRef.current) handleSymbolTapDouble(() => wrapSelectionWith('(', ')')); }}
                                            onPointerLeave={cancelSymbolHold}
                                            title="Luyến: ấn đúp để bọc đoạn (nếu bôi đen) hoặc chèn (, giữ để chọn ( / ) / wrap"
                                            className="px-3 py-2 bg-slate-50 text-slate-800 border border-slate-200 rounded-lg text-sm font-semibold hover:bg-slate-100 hover:border-slate-300 transition-all"
                                        >
                                            Slur
                                        </button>

                                        {/* Tie */}
                                        <button
                                            onClick={() => insertSmartText('-')}
                                            title="Tie (nối trường độ): -"
                                            className="px-3 py-2 bg-slate-50 text-slate-800 border border-slate-200 rounded-lg text-sm font-semibold hover:bg-slate-100 hover:border-slate-300 transition-all"
                                        >
                                            -
                                        </button>

                                        {/* Triplet */}
                                        <button
                                            onClick={() => insertSmartText('(3')}
                                            title="Triplet: (3"
                                            className="px-3 py-2 bg-slate-50 text-slate-800 border border-slate-200 rounded-lg text-sm font-semibold hover:bg-slate-100 hover:border-slate-300 transition-all"
                                        >
                                            (3
                                        </button>
                                    </div>

                                    <div className="space-y-2 pt-4">
                                        {OCTAVES.map(oct => (
                                            <div key={oct.id} className="flex items-stretch bg-slate-50 rounded-lg border border-slate-100 overflow-hidden">
                                                <div className="w-20 bg-slate-100 text-[11px] font-bold text-slate-500 uppercase tracking-wider flex items-center justify-center border-r border-slate-200">
                                                    {oct.label}
                                                </div>
                                                <div className="flex flex-1 p-1 gap-1 bg-white">
                                                    {NOTES.map(note => (
                                                        <button key={`${note}-${oct.id}`} onDoubleClick={() => handleNoteDoubleClick(note, oct)} onMouseDown={(e) => handleMouseDown(e, note, oct)} onMouseUp={handleMouseUpOrLeave} onMouseLeave={handleMouseUpOrLeave} className="flex-1 py-3 bg-white border border-slate-200 rounded-md text-center font-mono font-bold text-slate-700 hover:bg-indigo-50 hover:border-indigo-200 hover:text-indigo-700 active:bg-indigo-100 active:scale-95 transition-all relative group shadow-sm">
                                                            <div className="flex flex-col items-center justify-center gap-0.5 leading-none">
    <NoteIcon type={duration === '1' ? 'whole' : duration === '2' ? 'half' : duration === '32' ? 'thirtySecond' : duration === '16' ? 'sixteenth' : duration === '8' ? 'eighth' : 'quarter'} />
    <span className="text-[11px] font-mono font-bold">
        {oct.lowerCase ? note.toLowerCase() : note}
    </span>
</div>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {longPressTarget && (
                                    <div className="fixed z-50 bg-slate-800 text-white rounded-lg shadow-2xl flex p-1.5 gap-1 transform -translate-x-1/2" style={{ top: longPressTarget.y, left: longPressTarget.x }}>
                                        <button onClick={() => selectAccidental('^')} className="px-4 py-1.5 hover:bg-slate-700 rounded-md text-xl font-bold transition-colors">♯</button>
                                        <div className="w-px bg-slate-600 my-1"></div>
                                        <button onClick={() => selectAccidental('_')} className="px-4 py-1.5 hover:bg-slate-700 rounded-md text-xl font-bold transition-colors">♭</button>
                                        <div className="w-px bg-slate-600 my-1"></div>
                                        <button onClick={() => selectAccidental('=')} className="px-4 py-1.5 hover:bg-slate-700 rounded-md text-xl font-bold transition-colors">♮</button>
                                        <button onClick={() => setLongPressTarget(null)} className="px-2 py-1.5 hover:bg-red-500 rounded-md ml-1 transition-colors"><XIcon size={16}/></button>
                                        <div className="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-slate-800"></div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="w-7/12 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                            <div className="bg-slate-50 border-b border-slate-200 px-5 py-3 flex justify-between items-center z-10">
                                <div className="flex items-center text-slate-700">
                                    <Layers size={16} className="mr-2 text-indigo-500" />
                                    <h2 className="font-semibold text-sm">Bản nhạc trực tiếp (Live Preview)</h2>
                                </div>
                                {!abcjsLoaded && <span className="text-xs font-medium text-amber-500 animate-pulse">Đang tải ABCJS...</span>}
                            </div>
                            
                            <div className="flex-1 p-4 md:p-8 overflow-auto bg-[#F8FAFC]">
                                <div ref={renderAreaRef} className="abcjs-wrap bg-white shadow-md border border-slate-200 rounded-lg min-h-full p-0 transition-all duration-300 overflow-hidden"></div>
                            </div>
                        </div>
                    </div>
                
                    
                    {showLazyModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div
                                className="absolute inset-0 bg-black/40"
                                onClick={() => { setShowLazyModal(false); setLazyError(''); }}
                            />
                            <div className="relative w-full max-w-2xl bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
                                <div className="px-5 py-4 border-b border-slate-200 bg-slate-50 flex items-center justify-between">
                                    <div>
                                        <div className="text-sm font-bold text-slate-900">Lazy Mode</div>
                                        <div className="text-[11px] text-slate-500">Dán “ngôn ngữ người dùng” → bấm Sync để sinh ABC</div>
                                    </div>
                                    <button
                                        onClick={() => { setShowLazyModal(false); setLazyError(''); }}
                                        className="p-2 rounded-lg hover:bg-white border border-transparent hover:border-slate-200 transition-all"
                                        title="Đóng"
                                    >
                                        <XIcon size={18} className="text-slate-600" />
                                    </button>
                                </div>

                                <div className="p-5 space-y-3">
                                    <button
                                        onClick={() => setShowLazyInstruction(v => !v)}
                                        className="w-full flex items-center justify-between px-3 py-2 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 transition-all text-sm"
                                    >
                                        <span className="font-semibold text-slate-800">Instruction</span>
                                        <span className="text-slate-500 text-xs">{showLazyInstruction ? 'Ẩn' : 'Mở'}</span>
                                    </button>

                                    {showLazyInstruction && (
                                        <div className="text-[12px] text-slate-600 bg-slate-50 border border-slate-200 rounded-lg p-3 leading-relaxed">
                                            <div className="font-semibold text-slate-900 mb-2">Hướng dẫn nhập nhanh</div>

                                            <ol className="list-decimal pl-5 space-y-1">
                                                <li>Điền thông tin bài hát (có thể thiếu cũng được): <b>Ten bai</b>, <b>Tac gia</b>, <b>Nhip</b>, <b>Tempo</b>, <b>Giong</b>.</li>
                                                <li>Nhập nhạc cho <b>Tay phai</b> và (nếu có) <b>Tay trai</b>.</li>
                                                <li>Mỗi nốt viết dạng <span className="font-mono">Do4-den</span> (tên nốt + số octave + dấu <span className="font-mono">-</span> + độ dài).</li>
                                                <li>Dùng dấu phẩy <span className="font-mono">,</span> để ngăn cách các nốt. Dùng dấu chấm phẩy <span className="font-mono">;</span> để xuống ô nhịp.</li>
                                                <li>Hợp âm (bấm nhiều phím cùng lúc): viết trong ngoặc vuông, ví dụ <span className="font-mono">[Do5 Mi5]-trang</span>.</li>
                                                <li>Nghỉ (dấu lặng): dùng <span className="font-mono">7-trang</span>.</li>
                                                <li>Độ dài hợp lệ: <span className="font-mono">den</span>, <span className="font-mono">trang</span>, <span className="font-mono">tron</span>, <span className="font-mono">moc</span>, <span className="font-mono">moc-kep</span>, <span className="font-mono">moc-ba</span>. Thêm <span className="font-mono">-doi</span> để chấm dôi (VD: <span className="font-mono">den-doi</span>, <span className="font-mono">moc-kep-doi</span>).</li>
                                            </ol>

                                            <div className="mt-3 flex items-center justify-between">
                                                <div className="font-semibold text-slate-800">Ví dụ (copy được)</div>
                                                <div className="flex items-center gap-2">
                                                    <button
                                                        onClick={() => { setLazyInput(LAZY_PLACEHOLDER); setLazyError(''); }}
                                                        className="px-2 py-1 text-[11px] rounded-md border border-slate-200 bg-white hover:bg-slate-50"
                                                        title="Dán ví dụ vào ô nhập"
                                                    >
                                                        Dán vào ô
                                                    </button>
                                                    <button
                                                        onClick={copyLazyExample}
                                                        className="px-2 py-1 text-[11px] rounded-md bg-indigo-600 hover:bg-indigo-700 text-white"
                                                        title="Copy ví dụ"
                                                    >
                                                        Copy
                                                    </button>
                                                </div>
                                            </div>

                                            {lazyExampleCopied && (
                                                <div className="mt-1 text-[11px] text-emerald-700">✓ Đã copy ví dụ</div>
                                            )}

                                            <textarea
                                                readOnly
                                                value={LAZY_PLACEHOLDER}
                                                className="mt-2 w-full h-28 resize-none border border-slate-200 rounded-lg p-2 font-mono text-[11px] leading-relaxed bg-white text-slate-700"
                                            />
                                        </div>
                                    )}

                                    <textarea
                                        value={lazyInput}
                                        onChange={(e) => setLazyInput(e.target.value)}
                                        onKeyDown={(e) => {
                                            const isMac = /mac|iphone|ipad|ipod/i.test(navigator.platform);
                                            const mod = isMac ? e.metaKey : e.ctrlKey;
                                            if (mod && e.key === 'Enter') { e.preventDefault(); handleLazySync(); }
                                            if (e.key === 'Escape') { e.preventDefault(); setShowLazyModal(false); setLazyError(''); }
                                        }}
                                        placeholder={LAZY_PLACEHOLDER}
                                        className="w-full h-64 resize-none border border-slate-200 rounded-xl p-3 font-mono text-[12px] leading-relaxed outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 placeholder:text-slate-400"
                                        spellCheck="false"
                                    />

                                    {lazyError && (
                                        <div className="text-[12px] text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
                                            {lazyError}
                                        </div>
                                    )}

                                    <div className="flex items-center justify-end gap-2 pt-1">
                                        <button
                                            onClick={() => { setShowLazyModal(false); setLazyError(''); }}
                                            className="px-4 py-2 text-sm font-medium rounded-lg border border-slate-200 bg-white hover:bg-slate-50 transition-all"
                                        >
                                            Đóng
                                        </button>
                                        <button
                                            onClick={handleLazySync}
                                            className="px-4 py-2 text-sm font-medium rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white transition-all shadow-md shadow-indigo-200"
                                        >
                                            Sync → ABC
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}


                    {showAutoBarlinePreview && (
                        <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4">
                            <div
                                className="absolute inset-0 bg-black/40"
                                onClick={() => setShowAutoBarlinePreview(false)}
                            />
                            <div className="relative w-full max-w-4xl bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
                                <div className="px-5 py-4 border-b border-slate-200 bg-slate-50 flex items-center justify-between">
                                    <div>
                                        <div className="text-sm font-bold text-slate-900">Auto Barline (Preview)</div>
                                        <div className="text-[11px] text-slate-500">Sẽ xoá vạch nhịp cũ và chia lại theo M/L. Kiểm tra trước khi áp dụng.</div>
                                    </div>
                                    <button
                                        onClick={() => setShowAutoBarlinePreview(false)}
                                        className="p-2 rounded-lg hover:bg-white border border-transparent hover:border-slate-200 transition-all"
                                        title="Đóng"
                                    >
                                        <XIcon size={18} className="text-slate-600" />
                                    </button>
                                </div>

                                <div className="p-5 grid grid-cols-2 gap-4">
                                    <div>
                                        <div className="text-xs font-semibold text-slate-700 mb-2">Before</div>
                                        <textarea
                                            readOnly
                                            value={autoBarlineBefore}
                                            className="w-full h-80 resize-none border border-slate-200 rounded-xl p-3 font-mono text-[12px] leading-relaxed bg-white text-slate-700"
                                        />
                                    </div>
                                    <div>
                                        <div className="text-xs font-semibold text-slate-700 mb-2">After</div>
                                        <textarea
                                            readOnly
                                            value={autoBarlineAfter}
                                            className="w-full h-80 resize-none border border-slate-200 rounded-xl p-3 font-mono text-[12px] leading-relaxed bg-white text-slate-700"
                                        />
                                    </div>
                                </div>

                                <div className="px-5 py-4 border-t border-slate-200 bg-white flex items-center justify-end gap-2">
                                    <button
                                        onClick={() => setShowAutoBarlinePreview(false)}
                                        className="px-4 py-2 text-sm font-medium rounded-lg border border-slate-200 bg-white hover:bg-slate-50 transition-all"
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        onClick={applyAutoBarlinePreview}
                                        className="px-4 py-2 text-sm font-medium rounded-lg bg-amber-600 hover:bg-amber-700 text-white transition-all shadow-md shadow-amber-200"
                                    >
                                        Apply
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}


                    {symbolMenu.visible && (
                        <div
                            className="fixed z-[9999] bg-white border border-slate-200 rounded-lg shadow-lg overflow-hidden text-sm"
                            style={{ left: symbolMenu.x, top: symbolMenu.y, minWidth: 180 }}
                            onMouseDown={(e) => e.stopPropagation()}
                        >
                            {symbolMenu.items.map((it, i) => (
                                <button
                                    key={i}
                                    onClick={it.onClick}
                                    className="w-full text-left px-3 py-2 hover:bg-slate-50 flex items-center justify-between"
                                    title={it.title}
                                >
                                    <span className="font-mono font-semibold">{it.label}</span>
                                    <span className="text-[11px] text-slate-500 ml-3">{it.title}</span>
                                </button>
                            ))}
                        </div>
                    )}

{voiceMenu.visible && voiceMenu.voiceId === 2 && (
                        <div
                            className="fixed z-50 bg-white border border-slate-200 rounded-lg shadow-lg overflow-hidden text-sm"
                            style={{ left: voiceMenu.x, top: voiceMenu.y, minWidth: 200 }}
                            onMouseDown={(e) => e.stopPropagation()}
                        >
                            <button
                                onClick={() => toggleVoiceClef(2)}
                                className="w-full text-left px-3 py-2 hover:bg-slate-50 flex items-center gap-2"
                            >
                                <span className="text-lg leading-none">{(voices.find(v => v.id === 2)?.clef === 'treble') ? '𝄢' : '𝄞'}</span>
                                <span>Đổi khoá: {(voices.find(v => v.id === 2)?.clef === 'treble') ? 'Fa (Bass)' : 'Sol (Treble)'}</span>
                            </button>
                            <div className="h-px bg-slate-200" />
                            <button
                                onClick={() => deleteVoice(2)}
                                className="w-full text-left px-3 py-2 hover:bg-red-50 text-red-700 flex items-center gap-2"
                            >
                                <span>🗑️</span>
                                <span>Xoá Bè 2</span>
                            </button>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
